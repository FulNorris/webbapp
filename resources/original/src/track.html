<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#b91822">
  <title>Följ leverans</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIINfQgl0sN2o7fXzTDzMqi9f7JJG4F0R1M=" crossorigin="">
  <link rel="stylesheet" href="/src/style.css?v=20260505-01">
</head>
<body class="tracking-page">
  <main class="tracking-shell">
    <section class="tracking-panel">
      <img src="/assets/logo.png" alt="Stuckbema" class="tracking-logo">
      <h1>Din leverans är på väg</h1>
      <p id="trackingStatus">Hämtar liveposition...</p>
      <div class="tracking-map-frame" data-testid="tracking-map-frame">
        <div id="trackingMap" class="tracking-map" aria-label="Leveransposition"></div>
      </div>
      <button id="followVehicleBtn" class="secondary-btn" type="button">Följ bilen</button>
      <p id="trackingFollowStatus" class="tracking-follow-status">Följer bilen</p>
      <div class="tracking-meta">
        <p id="trackingAddress"></p>
        <p id="trackingUpdated"></p>
      </div>
      <a id="trackingMapsLink" class="primary tracking-map-link" href="#" target="_blank" rel="noopener noreferrer" hidden>Öppna i Google Maps</a>
    </section>
  </main>
  <script src="/src/core.js?v=20260506-01"></script>
  <script src="/src/config.js?v=20260505-01"></script>
  <script src="/src/environment.js?v=20260505-01"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="/src/track.js?v=20260505-01"></script>
</body>
</html>
